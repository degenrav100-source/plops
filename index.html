    <script>
      // Apply saved theme before paint to avoid a flash (defaults to dark).
      (function () {
        try {
          var t = localStorage.getItem("plops-theme");
          if (t !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
